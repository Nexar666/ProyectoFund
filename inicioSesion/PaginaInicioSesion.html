<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitConnect - Iniciar Sesión</title>+
    <link rel="icon" type="image/x-icon" href="../img/login.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #f0fdf4, #dcfce7);
     min-height: 100vh; display: flex; justify-content: center; align-items: center;">

    <main style="display: flex; max-width: 1000px; width: 90%; background: white; border-radius: 48px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); flex-wrap: wrap;">
        
        <aside style="flex: 1; background: linear-gradient(135deg, #22c55e, #166534); padding: 40px; text-align: center; color: white;">
            <br><br><br><br><br><br><br>
            <figure>
                <img src="../img/logo.jpg" style="font-size: 80px; width: 80px;">
            </figure>
            <h2 style="margin-top: 20px;">¡Bienvenido de vuelta!</h2>
            <p style="margin-top: 10px;">Mantén el ritmo y alcanza tus metas</p>
        </aside>

        <aside>
        <i class="fa-solid fa-house"></i> <!-- Casa -->
        <i class="fa-solid fa-user"></i> <!-- Usuario -->
        <i class="fa-solid fa-envelope"></i> <!-- Correo -->
        <i class="fa-solid fa-phone"></i> <!-- Teléfono -->
        <i class="fa-solid fa-cart-shopping"></i> <!-- Carrito -->
        <i class="fa-solid fa-heart"></i> <!-- Corazón -->
        <i class="fa-brands fa-facebook"></i> <!-- Facebook -->
        <i class="fa-brands fa-instagram"></i> <!-- Instagram -->
        </aside>
        
        <section style="flex: 1; padding: 40px;">
            
            <h1 style="color: #166534; margin-bottom: 10px;">Iniciar Sesión</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Accede a tu cuenta FitConnect</p>
            
            <form action="../deportista/dashboard.html" method="get">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;"> Correo electrónico</label>
                    <input type="email" name="email" required placeholder="tu@email.com" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 40px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;"> Contraseña</label>
                    <input type="password" name="password" required placeholder="********" minlength="6" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 40px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #334155;"> Tipo de usuario</label>
                    <select name="role" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 40px;">
                        <option value="deportista">Deportista</option>
                        <option value="entrenador">Entrenador</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" style="width: 100%; background: #22c55e; color: white; padding: 14px; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; cursor: pointer;">Iniciar Sesión</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="#" style="color: #22c55e; text-decoration: none;">¿Olvidaste tu contraseña?</a><br>
                <a href="../registro/PaginaDeRegistro.html" style="color: #22c55e; text-decoration: none;">¿No tienes cuenta? Regístrate</a>
            </div>
            <a href="../PaginaPrincipal.html" style="display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none;">← Volver al inicio</a>
        </section>
    </main>
</body>
</html>
